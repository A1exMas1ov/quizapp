<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp — Лобби участника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1629;
            --surface: #1a2338;
            --border: #2b3650;
            --white: #f1f5f9;
            --muted: #94a3b8;
            --purple: #7c3aed;
            --purple-l: #a78bfa;
            --lime: #a3e635;
            --font-h: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-h);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo {
            position: fixed;
            top: 24px;
            left: 40px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            color: var(--white);
            z-index: 10;
        }
        .logo .dot {
            color: var(--lime);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            text-decoration: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-lime {
            background: rgba(163,230,53,0.15);
            color: var(--lime);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--lime);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .text-muted {
            color: var(--muted);
        }
        .text-sm {
            font-size: 13px;
        }
        .text-xs {
            font-size: 12px;
        }
        .text-center {
            text-align: center;
        }

        .mb-8 {
            margin-bottom: 8px;
        }
        .mb-16 {
            margin-bottom: 16px;
        }
        .mb-24 {
            margin-bottom: 24px;
        }

        .font-h {
            font-family: var(--font-h);
        }
        .font-bold {
            font-weight: 700;
        }

        .lp-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,.15) 0%, transparent 65%);
            pointer-events: none;
        }

        .lp-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 20px;
        }

        .lp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 56px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .lp-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple) 0%, var(--purple-l) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-h);
            font-size: 26px;
            font-weight: 700;
            margin: 0 auto 16px;
            color: white;
        }

        .quiz-info-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .qib-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .qib-row:last-child {
            margin-bottom: 0;
        }

        .dots-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) {
            animation-delay: .2s;
        }
        .dot:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes dotBounce {
            0%, 80%, 100% {
                background: var(--border);
                transform: scale(1);
            }
            40% {
                background: var(--purple-l);
                transform: scale(1.4);
            }
        }

        @media (max-width: 500px) {
            .lp-card {
                padding: 32px 24px;
            }
            .logo {
                top: 16px;
                left: 20px;
            }
            .lp-avatar {
                width: 56px;
                height: 56px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="logo" onclick="window.location.href='/'">Quiz<span class="dot">App</span></div>
    <div class="lp-glow"></div>

    <div class="lp-wrap">
        <div class="lp-card">
            <div class="lp-avatar">АИ</div>
            <div class="font-h" style="font-size:22px;font-weight:700;margin-bottom:4px;">Алексей Иванов</div>
            <div class="text-sm text-muted mb-24">Участник</div>

            <div class="quiz-info-box" id="quizInfoBox">
                <div class="qib-row">
                    <span>🎓</span>
                    <div>
                        <div style="font-weight:600;">История России</div>
                    </div>
                </div>
                <div class="qib-row">
                    <span>⏱</span>
                    <div class="text-sm">30 секунд на вопрос</div>
                </div>
            </div>

            <div class="badge badge-lime mb-24" style="padding:8px 18px;font-size:13px;">
                <span class="pulse-dot"></span> <span id="pCount">4</span> участников уже в лобби
            </div>

            <div class="mb-24">
                <div class="text-sm text-muted mb-16">Ожидаем старта от организатора…</div>
                <div class="dots-row">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="text-sm text-muted" id="codeDisplay">Код комнаты: ABCD</div>
        </div>
    </div>
</body>
</html>
