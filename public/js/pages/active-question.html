<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp — Вопрос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1629;
            --surface: #1a2338;
            --border: #2b3650;
            --white: #f1f5f9;
            --muted: #94a3b8;
            --purple: #7c3aed;
            --purple-l: #a78bfa;
            --lime: #a3e635;
            --green: #22c55e;
            --red: #ef4444;
            --gold: #f59e0b;
            --font-h: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-h);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            color: var(--white);
        }
        .logo .dot {
            color: var(--lime);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-primary {
            background: var(--purple);
            color: white;
            border: 1px solid var(--purple);
        }
        .btn-primary:hover {
            background: #6d28d9;
        }

        .btn-lime {
            background: var(--lime);
            color: #0F1629;
            border: 1px solid var(--lime);
        }
        .btn-lime:hover {
            background: #bef264;
        }

        .btn-lg {
            padding: 16px 48px;
            font-size: 18px;
            border-radius: 14px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-purple {
            background: rgba(124,58,237,0.15);
            color: var(--purple-l);
        }

        .badge-lime {
            background: rgba(163,230,53,0.15);
            color: var(--lime);
        }

        .badge-red {
            background: rgba(239,68,68,0.15);
            color: var(--red);
        }

        .text-muted {
            color: var(--muted);
        }
        .text-xs {
            font-size: 12px;
        }
        .text-sm {
            font-size: 13px;
        }
        .text-center {
            text-align: center;
        }

        .mb-8 {
            margin-bottom: 8px;
        }
        .mb-16 {
            margin-bottom: 16px;
        }
        .mb-24 {
            margin-bottom: 24px;
        }
        .mt-24 {
            margin-top: 24px;
        }
        .mt-32 {
            margin-top: 32px;
        }

        .flex {
            display: flex;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .gap-24 {
            gap: 24px;
        }

        .font-h {
            font-family: var(--font-h);
        }
        .font-bold {
            font-weight: 700;
        }

        .timer-wrap {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 100px;
            height: 100px;
        }

        .timer-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 6;
        }

        .timer-ring {
            fill: none;
            stroke: var(--lime);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 282.7;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
        }

        .timer-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 26px;
            font-weight: 700;
            font-family: var(--font-h);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--purple);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 640px;
        }

        .answer-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            font-size: 15px;
            color: var(--white);
            width: 100%;
        }

        .answer-btn:hover:not(:disabled) {
            border-color: var(--purple);
            background: rgba(124,58,237,0.05);
        }

        .answer-btn.selected {
            border-color: var(--purple);
            background: rgba(124,58,237,0.15);
        }

        .answer-btn.correct {
            border-color: var(--green);
            background: rgba(34,197,94,0.15);
        }

        .answer-btn.wrong {
            border-color: var(--red);
            background: rgba(239,68,68,0.15);
        }

        .answer-btn:disabled {
            cursor: default;
        }

        .answer-btn:disabled:hover {
            border-color: var(--border);
            background: var(--surface);
        }

        .answer-btn:disabled.selected {
            border-color: var(--purple);
            background: rgba(124,58,237,0.15);
        }

        .answer-btn:disabled.correct {
            border-color: var(--green);
            background: rgba(34,197,94,0.15);
        }

        .answer-btn:disabled.wrong {
            border-color: var(--red);
            background: rgba(239,68,68,0.15);
        }

        .answer-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        .answer-letter.l-a { background: rgba(124,58,237,0.2); color: var(--purple-l); }
        .answer-letter.l-b { background: rgba(6,182,212,0.2); color: #06B6D4; }
        .answer-letter.l-c { background: rgba(245,158,11,0.2); color: var(--gold); }
        .answer-letter.l-d { background: rgba(34,197,94,0.2); color: var(--green); }

        .answer-text {
            flex: 1;
            font-weight: 500;
        }

        .hq-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .hq-progress {
            flex: 1;
            max-width: 400px;
            margin: 0 40px;
        }

        .hq-main {
            min-height: calc(100vh - 65px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 32px;
        }

        .hq-qtext {
            font-family: var(--font-h);
            font-size: clamp(20px, 3vw, 32px);
            font-weight: 600;
            text-align: center;
            max-width: 760px;
            line-height: 1.3;
            margin-bottom: 32px;
        }

        .pq-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .pq-progress {
            flex: 1;
            max-width: 300px;
            margin: 0 24px;
        }

        .pq-main {
            min-height: calc(100vh - 65px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }

        .pq-qtext {
            font-family: var(--font-h);
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 600;
            text-align: center;
            max-width: 680px;
            line-height: 1.3;
            margin-bottom: 32px;
        }

        .waiting-msg {
            text-align: center;
            padding: 60px 24px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .answers-grid {
                grid-template-columns: 1fr;
            }
            .hq-topbar, .pq-topbar {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .hq-progress, .pq-progress {
                margin: 0 12px;
                max-width: 100%;
                order: 3;
                width: 100%;
            }
            .hq-qtext, .pq-qtext {
                font-size: 18px;
            }
            .timer-wrap {
                width: 80px;
                height: 80px;
            }
            .timer-svg {
                width: 80px;
                height: 80px;
            }
            .timer-num {
                font-size: 20px;
            }
            .btn-lg {
                padding: 12px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="hq-topbar">
            <div class="logo">Quiz<span class="dot">App</span></div>
            <div class="hq-progress">
                <div class="text-xs text-muted text-center mb-8" id="qLabel">Вопрос 3 / 10</div>
                <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:30%"></div></div>
            </div>
            <button class="btn btn-ghost btn-sm" id="endQBtn">Завершить вопрос ⏭</button>
        </div>

        <div class="hq-main">
            <div class="timer-wrap mb-24">
                <svg class="timer-svg" width="100" height="100" viewBox="0 0 100 100">
                    <circle class="timer-bg" cx="50" cy="50" r="45"/>
                    <circle class="timer-ring" id="timerRing" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-num" id="timerNum">18</div>
            </div>

            <div class="hq-qtext" id="qText">В каком году была Бородинская битва?</div>
            <div id="qImageWrap"></div>

            <div class="answers-grid" id="answersGrid">
                <button class="answer-btn" style="cursor:default;">
                    <span class="answer-letter l-a">А</span>
                    <span class="answer-text">1812</span>
                </button>
                <button class="answer-btn" style="cursor:default;">
                    <span class="answer-letter l-b">Б</span>
                    <span class="answer-text">1805</span>
                </button>
                <button class="answer-btn" style="cursor:default;">
                    <span class="answer-letter l-c">В</span>
                    <span class="answer-text">1825</span>
                </button>
                <button class="answer-btn" style="cursor:default;">
                    <span class="answer-letter l-d">Г</span>
                    <span class="answer-text">1799</span>
                </button>
            </div>

            <div class="flex items-center gap-24 mt-32">
                <div class="badge badge-lime" style="padding:8px 18px;">
                    Ответили: <span id="answeredNum" class="font-bold">6</span>&nbsp;/ <span id="totalParts">8</span>
                </div>
            </div>

            <button class="btn btn-primary btn-lg mt-24" id="nextBtn" style="display:none;">Следующий вопрос →</button>
        </div>
    </div>
</body>
</html>
