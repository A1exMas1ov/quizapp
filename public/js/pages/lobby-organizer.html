<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp — Лобби организатора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1629;
            --surface: #1a2338;
            --border: #2b3650;
            --white: #f1f5f9;
            --muted: #94a3b8;
            --purple: #7c3aed;
            --purple-l: #a78bfa;
            --lime: #a3e635;
            --red: #ef4444;
            --font-h: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-h);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            color: var(--white);
        }
        .logo .dot {
            color: var(--lime);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-lime {
            background: var(--lime);
            color: #0F1629;
            border: 1px solid var(--lime);
        }
        .btn-lime:hover {
            background: #bef264;
        }

        .btn-lg {
            padding: 16px 48px;
            font-size: 18px;
            border-radius: 14px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-purple {
            background: rgba(124,58,237,0.15);
            color: var(--purple-l);
        }

        .badge-lime {
            background: rgba(163,230,53,0.15);
            color: var(--lime);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--lime);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .text-muted {
            color: var(--muted);
        }
        .text-sm {
            font-size: 13px;
        }
        .text-xs {
            font-size: 12px;
        }
        .text-center {
            text-align: center;
        }
        .text-purple {
            color: var(--purple-l);
        }

        .mb-8 {
            margin-bottom: 8px;
        }
        .mb-16 {
            margin-bottom: 16px;
        }
        .mb-24 {
            margin-bottom: 24px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .mt-24 {
            margin-top: 24px;
        }
        .mt-32 {
            margin-top: 32px;
        }

        .flex {
            display: flex;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .gap-12 {
            gap: 12px;
        }

        .font-h {
            font-family: var(--font-h);
        }
        .font-bold {
            font-weight: 700;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .lo-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .lo-main {
            display: grid;
            grid-template-columns: 1fr 360px;
            min-height: calc(100vh - 65px);
        }

        .lo-left {
            padding: 48px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .room-code-box {
            font-family: var(--font-h);
            font-size: 80px;
            font-weight: 700;
            letter-spacing: .18em;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px 48px;
            display: inline-block;
            color: var(--white);
        }

        .lo-right {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 24px;
        }

        .participant-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            animation: slideIn .3s ease;
            margin-bottom: 8px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: none; }
        }

        .lb-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
            background: rgba(124,58,237,0.2);
            color: var(--purple-l);
        }

        .lb-name {
            font-size: 14px;
            font-weight: 500;
        }

        #participantsList {
            flex: 1;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 560px;
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .lo-main {
                grid-template-columns: 1fr;
            }
            .lo-left {
                padding: 32px 20px;
            }
            .lo-right {
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 400px;
            }
            .room-code-box {
                font-size: 48px;
                padding: 16px 24px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .lo-topbar {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="lo-topbar">
            <div class="logo">Quiz<span class="dot">App</span></div>
            <div class="badge badge-purple" id="quizNameBadge">История России</div>
            <div class="badge badge-lime" id="statusPill">
                <span class="pulse-dot"></span> Ожидание участников
            </div>
        </div>

        <div class="lo-main">
            <div class="lo-left">
                <div class="text-center mb-24">
                    <div class="text-xs text-muted mb-16" style="letter-spacing:.12em;text-transform:uppercase;">Код комнаты</div>
                    <div class="room-code-box" id="roomCodeDisplay">ABCD</div>
                    <div class="text-sm text-muted mt-16">Участники заходят на сайт и вводят этот код</div>
                </div>

                <div class="stats-grid">
                    <div class="card text-center">
                        <div class="font-h text-purple" style="font-size:28px;font-weight:700;" id="pCountStat">4</div>
                        <div class="text-xs text-muted mt-8">Участников</div>
                    </div>
                    <div class="card text-center">
                        <div class="font-h text-purple" style="font-size:28px;font-weight:700;" id="qCountStat">10</div>
                        <div class="text-xs text-muted mt-8">Вопросов</div>
                    </div>
                    <div class="card text-center">
                        <div class="font-h text-purple" style="font-size:28px;font-weight:700;" id="timeStat">30с</div>
                        <div class="text-xs text-muted mt-8">На вопрос</div>
                    </div>
                </div>

                <div class="text-center mt-32">
                    <button class="btn btn-lime btn-lg" id="startBtn">▶ Начать квиз</button>
                    <div class="text-sm text-muted mt-8">Участники получат первый вопрос сразу после старта</div>
                </div>
            </div>

            <div class="lo-right">
                <div class="flex justify-between items-center mb-16">
                    <h3 class="font-h" style="font-size:16px;font-weight:600;">Участники</h3>
                    <span class="badge badge-purple" id="countBadge">4</span>
                </div>
                <div id="participantsList">
                    <div class="participant-row">
                        <div class="lb-avatar" style="background:rgba(124,58,237,0.2);color:var(--purple-l);">АИ</div>
                        <div class="lb-name">Алексей Иванов</div>
                    </div>
                    <div class="participant-row">
                        <div class="lb-avatar" style="background:rgba(6,182,212,0.2);color:#06B6D4;">МП</div>
                        <div class="lb-name">Мария Петрова</div>
                    </div>
                    <div class="participant-row">
                        <div class="lb-avatar" style="background:rgba(245,158,11,0.2);color:#F59E0B;">ДС</div>
                        <div class="lb-name">Дмитрий Соколов</div>
                    </div>
                    <div class="participant-row">
                        <div class="lb-avatar" style="background:rgba(34,197,94,0.2);color:#22C55E;">ЕК</div>
                        <div class="lb-name">Екатерина Козлова</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
