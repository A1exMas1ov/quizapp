<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp — квизы в реальном времени</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1629;
            --surface: #1a2338;
            --border: #2b3650;
            --white: #f1f5f9;
            --muted: #94a3b8;
            --purple: #7c3aed;
            --purple-l: #a78bfa;
            --lime: #a3e635;
            --font-h: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-h);
            line-height: 1.5;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            color: var(--white);
        }
        .logo .dot {
            color: var(--lime);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-ghost {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-primary {
            background: var(--purple);
            color: white;
            border: 1px solid var(--purple);
        }
        .btn-primary:hover {
            background: #6d28d9;
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 8px;
        }

        .home-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 60px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(15, 22, 41, 0.92);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 100px 60px 80px;
            position: relative;
            overflow: hidden;
        }

        .hero h1 {
            font-size: clamp(40px, 6vw, 72px);
            font-weight: 700;
            line-height: 1.08;
            max-width: 800px;
            margin-bottom: 22px;
        }
        .hero h1 em {
            color: var(--purple-l);
            font-style: normal;
        }

        .hero-sub {
            font-size: 18px;
            color: var(--muted);
            max-width: 520px;
            line-height: 1.6;
            margin-bottom: 52px;
        }

        .room-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 40px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        .room-card-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .room-input-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .room-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: var(--font-h);
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .room-input::placeholder {
            color: var(--border);
        }
        .room-input:focus {
            border-color: var(--purple);
        }

        .btn-join {
            background: var(--lime);
            border: none;
            color: #0F1629;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-join:hover {
            background: #bef264;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-links {
            display: flex;
            gap: 10px;
        }
        .auth-links button {
            flex: 1;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 32px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .home-nav,
            .hero,
            footer {
                padding-left: 20px;
                padding-right: 20px;
            }
            .hero {
                padding: 60px 20px 50px;
            }
            .room-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <nav class="home-nav">
            <div class="logo" onclick="window.location.href='/'">Quiz<span class="dot">App</span></div>
            <div class="nav-actions">
                <button class="btn btn-ghost btn-sm" id="navLoginBtn">Войти</button>
                <button class="btn btn-primary btn-sm" id="navRegisterBtn">Зарегистрироваться</button>
            </div>
        </nav>

        <section class="hero">
            <h1>Проводи квизы,<br>которые <em>запоминают</em></h1>
            <p class="hero-sub">Создавай вопросы, запускай игры по коду комнаты и следи за результатами вживую</p>
            
            <div class="room-card">
                <div class="room-card-label">Присоединиться к квизу</div>
                <div class="room-input-wrap">
                    <input class="room-input" id="roomCode" type="text" placeholder="XXXX" maxlength="6">
                    <button class="btn-join" id="joinBtn">Войти →</button>
                </div>
                <div class="divider">или</div>
                <div class="auth-links">
                    <button class="btn btn-ghost" id="loginLinkBtn">Войти в аккаунт</button>
                    <button class="btn btn-primary" id="registerLinkBtn">Создать квиз</button>
                </div>
            </div>
        </section>

        <footer>
            <div class="logo" style="font-size:16px">Quiz<span class="dot">App</span></div>
            <span>© 2026 QuizApp</span>
        </footer>
    </div>
</body>
</html>
